<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SQLite Explorer</title>
  <style>
    body { font-family: system-ui; max-width: 800px; margin: 2rem auto; padding: 1rem; }
    input, button, textarea { width: 100%; padding: 0.5rem; margin: 0.5rem 0; }
    pre { background: #f0f0f0; padding: 1rem; overflow-x: auto; }
  </style>
</head>
<body>
  <h1>🗄️ SQLite Proxy Explorer</h1>
  <label>API Key:</label>
  <input type="password" id="apiKey" placeholder="Your API_SECRET_KEY">
  <button id="saveKey">Save Key</button>
  <label>SQL Query:</label>
  <textarea id="sql" rows="3">SELECT name FROM sqlite_master WHERE type='table'</textarea>
  <button id="run">Execute</button>
  <pre id="output"></pre>

  <script>
    let apiKey = localStorage.getItem('myKey') || '';
    document.getElementById('apiKey').value = apiKey;
    document.getElementById('saveKey').onclick = () => {
      apiKey = document.getElementById('apiKey').value.trim();
      localStorage.setItem('myKey', apiKey);
      alert('Key saved');
    };
    document.getElementById('run').onclick = async () => {
      const sql = document.getElementById('sql').value.trim();
      if (!sql || !apiKey) return alert('Enter SQL and API key');
      try {
        const res = await fetch('/api/db?sql=' + encodeURIComponent(sql), {
          headers: { 'X-API-Key': apiKey }
        });
        const data = await res.json();
        document.getElementById('output').innerText = JSON.stringify(data, null, 2);
      } catch (err) {
        document.getElementById('output').innerText = 'Error: ' + err.message;
      }
    };
  </script>
</body>
</html>
